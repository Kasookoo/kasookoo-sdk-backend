logging:
  logs:
    default:
      level: INFO
storage:
  module: file_system
  root: /data
apps:
  tls:
    certificates:
      automate:
        - inapp.kasookoo.ai
        - inapp-turn.kasookoo.ai
        - inapp-whip.kasookoo.ai
        - sdk.kasookoo.ai
        - monitoring.kasookoo.ai
  http:
    servers:
      main_http:
        listen: [":443"]
        protocols: ["h1", "h2"]
        routes:
          - match:
              - host: ["sdk.kasookoo.ai"]
            handle:
              - handler: reverse_proxy
                upstreams:
                  - dial: "localhost:7000"
            terminal: true
