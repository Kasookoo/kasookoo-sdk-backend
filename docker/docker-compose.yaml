# This docker-compose requires host networking, which is only available on Linux
# This compose will not function correctly on Mac or Windows
services:
  caddy:
    image: livekit/caddyl4
    command: run --config /etc/caddy.yaml --adapter yaml
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./caddy.yaml:/etc/caddy.yaml
      - ./caddy_data:/data
      - type: bind
        source: /var/www/html
        target: /var/www/html
      - /usr/share/livekit/log/caddy:/var/log/caddy

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
      - /usr/share/livekit/log/livekit:/var/log/livekit

  redis:
    image: redis:7-alpine
    command: redis-server /etc/redis.conf
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./redis.conf:/etc/redis.conf

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    network_mode: "host"
    volumes:
      - ./egress.yaml:/etc/egress.yaml
      - /usr/share/livekit/log/egress:/var/log/egress
    cap_add:
      - CAP_SYS_ADMIN

  ingress:
    image: livekit/ingress:latest
    restart: unless-stopped
    environment:
      - INGRESS_CONFIG_FILE=/etc/ingress.yaml
    network_mode: "host"
    volumes:
      - ./ingress.yaml:/etc/ingress.yaml
      - /usr/share/livekit/log/ingress:/var/log/ingress

  sip:
    image: livekit/sip:latest
    network_mode: host
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_SDK_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_SDK_API_SECRET}
      LIVEKIT_WS_URL: "ws://localhost:7880"
      SIP_CONFIG_BODY: |
        redis:
          address: "localhost:6379"
        sip_port: 5060
        rtp_port: 10000-20000
        use_external_ip: true
        logging:
          level: debug
    restart: unless-stopped

  kasookoo-sdk-backend:
    build:
      context: /usr/share/kasookoo-sdk-backend
      dockerfile: Dockerfile
    container_name: kasookoo-sdk-backend
    restart: unless-stopped
    network_mode: "host"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-43800}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - STATIC_API_KEY=${STATIC_API_KEY}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - SIP_OUTBOUND_TRUNK_ID=${SIP_OUTBOUND_TRUNK_ID}
      - LIVEKIT_AFRICA_API_KEY=${LIVEKIT_AFRICA_API_KEY}
      - LIVEKIT_AFRICA_API_SECRET=${LIVEKIT_AFRICA_API_SECRET}
      - LIVEKIT_AFRICA_URL=${LIVEKIT_AFRICA_URL}
      - AFRICA_SIP_OUTBOUND_TRUNK_ID=${AFRICA_SIP_OUTBOUND_TRUNK_ID}
      - LIVEKIT_SDK_URL=${LIVEKIT_SDK_URL}
      - LIVEKIT_SDK_API_KEY=${LIVEKIT_SDK_API_KEY}
      - LIVEKIT_SDK_API_SECRET=${LIVEKIT_SDK_API_SECRET}
      - SDK_SIP_OUTBOUND_TRUNK_ID=${SDK_SIP_OUTBOUND_TRUNK_ID}
      - MONGO_URI=${MONGO_URI}
      - DB_NAME=${DB_NAME}
      - CLERK_ISSUER=${CLERK_ISSUER}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_AUDIENCE=${CLERK_AUDIENCE}
      - API_HOST=${API_HOST}
      - DEFAULT_PHONE_NUMBER=${DEFAULT_PHONE_NUMBER}
      - GUI_URL=${GUI_URL}
      - PASSWORD_RESET_TOKEN_EXPIRE_HOURS=${PASSWORD_RESET_TOKEN_EXPIRE_HOURS}
      - PASSWORD_RESET_OTP_EXPIRE_MINUTES=${PASSWORD_RESET_OTP_EXPIRE_MINUTES}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - EMAIL_DEFAULT_ENCODING=${EMAIL_DEFAULT_ENCODING}
      - EMAIL_FROM=${EMAIL_FROM}
      - ANONYMOUS_GUEST_CALL_ADMIN_EMAIL=${ANONYMOUS_GUEST_CALL_ADMIN_EMAIL}
      - FIREBASE_CREDENTIALS_PATH=/app/app/credentials/firebase-service-account.json
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-kasookoo-sdk-f7f3f}
      - FIREBASE_API_KEY=${FIREBASE_API_KEY:-}
      - FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN:-}
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-af-south-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-kasookoo-sdk}
    volumes:
      - /usr/share/kasookoo-sdk-backend/app/credentials:/app/app/credentials:ro
      - /usr/share/kasookoo-sdk-backend/log:/app/log

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/share/kasookoo-sdk-backend/log:/app/sdk-log:ro
      - /usr/share/livekit/log:/usr/share/livekit/log:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
