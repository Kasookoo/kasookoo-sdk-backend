apiVersion: apps/v1
kind: Deployment
metadata:
  name: kasookoo-sdk-backend
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "200m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
